<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalmStrokes — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--card:#0f0f1a;--border:#1a1a2e;--accent:#00ff88;--accent2:#ff3366;--accent3:#ffcc00;--text:#e0e0f0;--muted:#404060;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,255,136,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,51,102,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.container{max-width:1400px;margin:0 auto;padding:32px 24px;position:relative;z-index:1;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;border-bottom:1px solid var(--border);padding-bottom:24px;}
.brand{display:flex;align-items:center;gap:16px;}
.brand-icon{width:52px;height:52px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#000;}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--text);}
.brand p{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.live-badge{display:flex;align-items:center;gap:8px;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:100px;padding:8px 16px;font-size:11px;color:var(--accent);letter-spacing:1px;}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.stat:hover{border-color:var(--accent);}
.stat::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:10px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:var(--text);}
.stat-value.green{color:var(--accent);}
.stat-value.red{color:var(--accent2);}
.stat-value.yellow{color:var(--accent3);}
.controls{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.ctrl-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.ppd{display:flex;align-items:center;gap:12px;}
.ppd-btn{width:32px;height:32px;background:var(--border);border:none;color:var(--text);border-radius:8px;font-size:16px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;}
.ppd-btn:hover{background:var(--accent);color:#000;}
.ppd-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);min-width:36px;text-align:center;}
.ppd-sub{font-size:9px;color:var(--muted);}
.apply-btn{margin-left:auto;background:var(--accent);color:#000;border:none;border-radius:10px;padding:10px 24px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.apply-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,255,136,0.3);}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.cal-nav{display:flex;gap:8px;}
.nav-btn{width:32px;height:32px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day-hdr{text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:6px 0;}
.day{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;min-height:100px;transition:border-color 0.2s;position:relative;overflow:hidden;}
.day:hover{border-color:rgba(0,255,136,0.3);}
.day.today{border-color:var(--accent);}
.day.today::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.day.empty{background:transparent;border-color:transparent;}
.day.past{opacity:0.3;}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);margin-bottom:6px;}
.day.today .day-num{color:var(--accent);}
.post-badge{display:inline-block;background:rgba(0,255,136,0.15);color:var(--accent);border-radius:4px;font-size:8px;padding:2px 6px;margin-bottom:4px;letter-spacing:1px;}
.post-badge.posted{background:rgba(255,51,102,0.15);color:var(--accent2);}
.thumb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;}
.thumb{aspect-ratio:1;background:var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.post-time{font-size:8px;color:var(--muted);margin-top:3px;}
.loading{grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px 20px;font-size:12px;transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
.drive-status{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);}
.drive-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <div class="brand-icon">🎮</div>
      <div>
        <h1>CALMSTROKES</h1>
        <p>Auto Post Command Center</p>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="drive-status"><div class="drive-dot"></div>Google Drive Connected</div>
      <div class="live-badge"><div class="live-dot"></div>RAILWAY LIVE</div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">In Google Drive</div><div class="stat-value green" id="sDrive">—</div></div>
    <div class="stat"><div class="stat-label">Total Posted</div><div class="stat-value red" id="sPosted">—</div></div>
    <div class="stat"><div class="stat-label">Days of Content</div><div class="stat-value yellow" id="sDays">—</div></div>
    <div class="stat"><div class="stat-label">Posts Per Day</div><div class="stat-value" id="sPPD">—</div></div>
  </div>

  <div class="controls">
    <div class="ctrl-label">Posts per day</div>
    <div class="ppd">
      <button class="ppd-btn" onclick="adj(-1)">−</button>
      <div><div class="ppd-num" id="ppd">5</div><div class="ppd-sub">per day</div></div>
      <button class="ppd-btn" onclick="adj(1)">+</button>
    </div>
    <button class="apply-btn" onclick="apply()">⚡ APPLY</button>
  </div>

  <div class="cal-header">
    <div class="cal-title" id="calTitle">MARCH 2026</div>
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevMo()">←</button>
      <button class="nav-btn" onclick="nextMo()">→</button>
    </div>
  </div>

  <div class="cal-grid" id="calGrid">
    <div class="loading"><div class="spinner"></div>Loading schedule...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let ppd=5,yr=new Date().getFullYear(),mo=new Date().getMonth(),queue=[],postedCount=0,driveCount=0;
const MONTHS=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const EMOJIS=['🎮','🕹️','👾','🎯','🏆','⚡','🔥','💥','🌟','🎲','🎪','🎨'];

async function load(){
  try{
    const[qr,sr]=await Promise.all([fetch('/api/queue'),fetch('/api/stats')]);
    queue=await qr.json();
    const s=await sr.json();
    driveCount=s.total_images;
    postedCount=s.total_posted;
    ppd=s.posts_per_day;
    document.getElementById('sDrive').textContent=s.total_images;
    document.getElementById('sPosted').textContent=s.total_posted;
    document.getElementById('sDays').textContent=s.days_of_content;
    document.getElementById('sPPD').textContent=s.posts_per_day;
    document.getElementById('ppd').textContent=ppd;
    render();
  }catch(e){console.error(e);}
}

function adj(d){ppd=Math.max(1,Math.min(10,ppd+d));document.getElementById('ppd').textContent=ppd;}

async function apply(){
  const b=document.querySelector('.apply-btn');
  b.textContent='...';b.disabled=true;
  try{
    const r=await fetch('/api/rebuild-queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({posts_per_day:ppd})});
    const d=await r.json();
    toast(`✅ ${d.total} posts scheduled!`);
    await load();
  }catch(e){toast('❌ Error');}
  b.textContent='⚡ APPLY';b.disabled=false;
}

function render(){
  const g=document.getElementById('calGrid');
  document.getElementById('calTitle').textContent=`${MONTHS[mo]} ${yr}`;
  const byDate={};
  queue.forEach(q=>{if(!byDate[q.date])byDate[q.date]=[];byDate[q.date].push(q);});
  const first=new Date(yr,mo,1).getDay();
  const days=new Date(yr,mo+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  let h=`<div class="day-hdr">SUN</div><div class="day-hdr">MON</div><div class="day-hdr">TUE</div><div class="day-hdr">WED</div><div class="day-hdr">THU</div><div class="day-hdr">FRI</div><div class="day-hdr">SAT</div>`;
  for(let i=0;i<first;i++)h+=`<div class="day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today,isPast=ds<today;
    const posts=byDate[ds]||[];
    let cls='day'+(isT?' today':'')+(isPast&&!isT?' past':'');
    let inner='';
    if(posts.length){
      const allPosted=posts.every(p=>p.status==='posted');
      inner+=`<div class="post-badge${allPosted?' posted':''}">${posts.length} POST${posts.length>1?'S':''}</div>`;
      if(posts.length===1){
        inner+=`<div class="thumb">${EMOJIS[d%EMOJIS.length]}</div><div class="post-time">${posts[0].time}</div>`;
      }else{
        inner+=`<div class="thumb-grid">`;
        posts.slice(0,4).forEach((_,i)=>inner+=`<div class="thumb">${EMOJIS[(d+i)%EMOJIS.length]}</div>`);
        inner+=`</div>`;
        if(posts.length>4)inner+=`<div class="post-time">+${posts.length-4} more</div>`;
      }
    }
    h+=`<div class="${cls}"><div class="day-num">${d}</div>${inner}</div>`;
  }
  g.innerHTML=h;
}

function prevMo(){mo--;if(mo<0){mo=11;yr--;}render();}
function nextMo(){mo++;if(mo>11){mo=0;yr++;}render();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
load();setInterval(load,30000);
</script>
</body>
</html>

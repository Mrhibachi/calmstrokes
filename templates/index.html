<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalmStrokes — Post Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#1e1e2e;--accent:#7c6aff;--accent2:#ff6a6a;--accent3:#6affb0;--text:#e8e8f0;--muted:#5a5a7a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.container{max-width:1300px;margin:0 auto;padding:40px 24px;position:relative;z-index:1;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;flex-wrap:wrap;gap:20px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 30px rgba(124,106,255,0.3);}
.logo-text h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;}
.logo-text p{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.status-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:12px;color:var(--accent3);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:40px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.stat-card:hover{border-color:var(--accent);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;}
.controls{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 28px;margin-bottom:36px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.control-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);white-space:nowrap;}
.posts-control{display:flex;align-items:center;gap:12px;}
.count-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.count-btn:hover{background:var(--accent);border-color:var(--accent);}
.count-display{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);min-width:40px;text-align:center;}
.count-sub{font-size:11px;color:var(--muted);}
.apply-btn{margin-left:auto;background:linear-gradient(135deg,var(--accent),#9b6aff);color:white;border:none;border-radius:12px;padding:12px 28px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,106,255,0.3);}
.apply-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,106,255,0.4);}
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.calendar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.calendar-nav{display:flex;gap:8px;}
.nav-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;cursor:pointer;font-size:16px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.day-header{text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:8px 0;}
.day-cell{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;min-height:120px;transition:border-color 0.2s;position:relative;overflow:hidden;}
.day-cell.today{border-color:var(--accent);box-shadow:0 0 20px rgba(124,106,255,0.15);}
.day-cell.today::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.day-cell.empty{background:transparent;border-color:transparent;}
.day-cell.past{opacity:0.4;}
.day-number{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.day-cell.today .day-number{color:var(--accent);}
.post-count-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:white;border-radius:6px;font-size:9px;font-weight:600;padding:2px 6px;margin-bottom:6px;}
.posts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.mini-thumb{aspect-ratio:1;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;}
.post-time{font-size:9px;color:var(--muted);text-align:center;margin-top:4px;}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px;grid-column:1/-1;}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:32px;right:32px;background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:16px 24px;font-size:13px;box-shadow:0 8px 40px rgba(0,0,0,0.4);transform:translateY(100px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:1000;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div class="logo-text">
        <h1>CalmStrokes</h1>
        <p>Post Scheduler</p>
      </div>
    </div>
    <div class="status-pill"><div class="status-dot"></div>Scheduler Active</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Images in Queue</div><div class="stat-value" id="statQueued">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Posted</div><div class="stat-value" id="statPosted">—</div></div>
    <div class="stat-card"><div class="stat-label">Days of Content</div><div class="stat-value" id="statDays">—</div></div>
    <div class="stat-card"><div class="stat-label">Posts Per Day</div><div class="stat-value" id="statPPD">—</div></div>
  </div>
  <div class="controls">
    <div class="control-label">Posts per day</div>
    <div class="posts-control">
      <button class="count-btn" onclick="adjustPosts(-1)">−</button>
      <div><div class="count-display" id="postsCount">5</div><div class="count-sub">per day</div></div>
      <button class="count-btn" onclick="adjustPosts(1)">+</button>
    </div>
    <button class="apply-btn" onclick="applySchedule()">⚡ Apply Schedule</button>
  </div>
  <div class="calendar-header">
    <div class="calendar-title" id="calendarTitle"></div>
    <div class="calendar-nav">
      <button class="nav-btn" onclick="prevMonth()">←</button>
      <button class="nav-btn" onclick="nextMonth()">→</button>
    </div>
  </div>
  <div class="calendar-grid" id="calendarGrid">
    <div class="loading"><div class="loading-spinner"></div>Loading your schedule...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let postsPerDay=5,currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),queue=[];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const EMOJIS=['🎮','🕹️','👾','🎯','🏆','⚡','🔥','💥','🌟','🎲'];
async function loadData(){
  try{
    const[queueRes,statsRes]=await Promise.all([fetch('/api/queue'),fetch('/api/stats')]);
    queue=await queueRes.json();
    const stats=await statsRes.json();
    document.getElementById('statQueued').textContent=stats.total_queued;
    document.getElementById('statPosted').textContent=stats.total_posted;
    document.getElementById('statDays').textContent=stats.days_of_content;
    document.getElementById('statPPD').textContent=stats.posts_per_day;
    postsPerDay=stats.posts_per_day;
    document.getElementById('postsCount').textContent=postsPerDay;
    renderCalendar();
  }catch(e){console.error(e);}
}
function adjustPosts(delta){postsPerDay=Math.max(1,Math.min(10,postsPerDay+delta));document.getElementById('postsCount').textContent=postsPerDay;}
async function applySchedule(){
  const btn=document.querySelector('.apply-btn');
  btn.textContent='⏳ Rebuilding...';btn.disabled=true;
  try{
    const res=await fetch('/api/rebuild-queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({posts_per_day:postsPerDay})});
    const data=await res.json();
    showToast(`✅ Schedule updated! ${data.total} posts queued.`);
    await loadData();
  }catch(e){showToast('❌ Error updating schedule');}
  btn.textContent='⚡ Apply Schedule';btn.disabled=false;
}
function renderCalendar(){
  const grid=document.getElementById('calendarGrid');
  document.getElementById('calendarTitle').textContent=`${MONTHS[currentMonth]} ${currentYear}`;
  const byDate={};
  queue.forEach(item=>{if(!byDate[item.date])byDate[item.date]=[];byDate[item.date].push(item);});
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  let html=`<div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div><div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>`;
  for(let i=0;i<firstDay;i++)html+=`<div class="day-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const isPast=dateStr<today;
    const posts=byDate[dateStr]||[];
    let cellClass='day-cell'+(isToday?' today':'')+(isPast&&!isToday?' past':'');
    let postsHtml='';
    if(posts.length>0){
      postsHtml+=`<div class="post-count-badge">${posts.length} post${posts.length>1?'s':''}</div>`;
      if(posts.length===1){
        postsHtml+=`<div style="width:100%;aspect-ratio:1;background:var(--surface);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--border)">${EMOJIS[day%EMOJIS.length]}</div><div class="post-time">${posts[0].time}</div>`;
      }else{
        postsHtml+=`<div class="posts-grid">`;
        posts.slice(0,4).forEach((p,i)=>{postsHtml+=`<div class="mini-thumb">${EMOJIS[(day+i)%EMOJIS.length]}</div>`;});
        postsHtml+=`</div>`;
        if(posts.length>4)postsHtml+=`<div class="post-time">+${posts.length-4} more</div>`;
      }
    }
    html+=`<div class="${cellClass}"><div class="day-number">${day}</div>${postsHtml}</div>`;
  }
  grid.innerHTML=html;
}
function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}
function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
